<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AgriSmart Rwanda</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-emerald-700 h-screen flex items-center justify-center p-6 font-['Inter','Segoe_UI',Roboto,Helvetica,Arial,sans-serif]">

    <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-sm border border-emerald-100">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-emerald-700 tracking-tighter italic">HingaSmart</h1>
            <p class="text-slate-400 text-sm mt-2 font-medium">Welcome back! Please sign in.</p>
        </div>

        <form class="space-y-5">
            <div>
                <label class="text-xs font-bold text-slate-500 uppercase ml-1">Username</label>
                <input type="text" placeholder="Your name or phone" 
                       class="w-full mt-1 p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 transition">
            </div>

            <div>
                <label class="text-xs font-bold text-slate-500 uppercase ml-1">Password</label>
                <input type="password" placeholder="Enter Password" 
                       class="w-full mt-1 p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 transition">
            </div>

            <div class="flex items-center justify-between px-1">
                <label class="flex items-center text-xs font-bold text-slate-500 cursor-pointer">
                    <input type="checkbox" class="mr-2 accent-emerald-600"> Keep me signed in
                </label>
                <a href="#" class="text-xs font-bold text-emerald-600 hover:underline">Forgot?</a>
            </div>
            
            <a href="Agri system.html" 
               class="block w-full bg-emerald-600 text-white text-center py-4 rounded-2xl font-bold shadow-lg shadow-emerald-200 hover:bg-emerald-700 transition active:scale-95 uppercase tracking-wide text-sm">
                Go to Dashboard
            </a>
        </form>

        <div class="mt-8 text-center">
            <p class="text-xs text-slate-400 font-medium">
                New to HingaSmart? <a href="#" class="text-emerald-600 font-bold hover:underline">Create Account</a>
            </p>
        </div>
    </div>

</body>
</html>
